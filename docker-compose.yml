version: '3.8'

services:
  db:
    image: postgres:16
    container_name: shanshan-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: shanshan
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d shanshan"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
